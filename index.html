<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f5f5f7">
  <title>STRpal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/app.css?v=22">
</head>
<body>

  <!-- Name Picker (first visit only) -->
  <div id="picker-screen" class="screen">
    <div class="auth-container">
      <h1 class="auth-logo">STRpal</h1>
      <p class="auth-subtitle">Crew Operations</p>
      <div id="picker-list" style="width:100%;max-width:340px"></div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="screen active">
    <!-- Top Bar -->
    <header id="top-bar">
      <h1 id="page-title">Tasks</h1>
      <div class="top-bar-actions">
        <button id="notifications-btn" class="icon-btn notif-btn" aria-label="Notifications">
          <i data-lucide="bell" class="icon-24"></i>
          <span id="notif-badge" class="notif-badge" hidden>0</span>
        </button>
        <button id="profile-btn" class="icon-btn" aria-label="Profile">
          <i data-lucide="user" class="icon-24"></i>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content">

      <!-- Feed View -->
      <div id="view-feed" class="view active">
        <div id="feed-filters" hidden>
          <select id="feed-status-filter">
            <option value="">All Status</option>
            <option value="Open">Open</option>
            <option value="Researching">Researching</option>
            <option value="To Pay">To Pay</option>
          </select>
          <select id="feed-assignee-filter">
            <option value="">Everyone</option>
            <option value="unassigned">Unassigned</option>
          </select>
        </div>
        <div id="feed-list" class="card-list"></div>
        <button id="quick-list-btn" class="fab fab-secondary" aria-label="Quick list" hidden>
          <i data-lucide="list" class="icon-22"></i>
        </button>
        <button id="add-task-btn" class="fab" aria-label="Add task" hidden>+</button>
      </div>

      <!-- Task Detail View -->
      <div id="view-task-detail" class="view">
        <div id="task-detail-content"></div>
      </div>

      <!-- Report View (Issue or Invoice) -->
      <div id="view-report" class="view">
        <div class="feed-tabs" id="report-tabs">
          <button class="feed-tab active" data-report-mode="issue">Issue</button>
          <button class="feed-tab" data-report-mode="invoice">Invoice</button>
        </div>

        <form id="report-form">
          <div id="report-photo-picker"></div>
          <textarea id="report-note" placeholder="What's the problem? (optional)" rows="3"></textarea>
          <div class="priority-toggle">
            <button type="button" class="priority-btn active" data-priority="HAVE">
              <span class="priority-dot urgent"></span> Urgent Fix
            </button>
            <button type="button" class="priority-btn" data-priority="WANT">
              <span class="priority-dot later"></span> For Later
            </button>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Submit Issue</button>
        </form>

        <form id="invoice-form" hidden>
          <div id="invoice-photo-picker"></div>
          <select id="invoice-vendor-select">
            <option value="">— No vendor (or enter name below) —</option>
          </select>
          <input type="text" id="invoice-title" placeholder="What's this for?" required>
          <input type="number" id="invoice-amount" placeholder="Amount ($)" step="0.01" min="0" required>
          <input type="text" id="invoice-submitter" placeholder="Submitter name (if no vendor selected)">
          <button type="submit" class="btn btn-primary btn-block">Submit Invoice</button>
        </form>
      </div>

      <!-- Calendar View -->
      <div id="view-calendar" class="view">
        <div class="feed-tabs" id="calendar-tabs">
          <button class="feed-tab active" data-cal-tab="list">Stays</button>
          <button class="feed-tab" data-cal-tab="calendar">Month</button>
          <button class="feed-tab" data-cal-tab="due">Due Dates</button>
        </div>

        <div id="calendar-list-panel"></div>

        <div id="calendar-due-panel" class="due-feed" hidden></div>

        <div id="calendar-grid-panel" hidden>
          <div id="calendar-header">
            <button id="cal-prev" class="icon-btn">&larr;</button>
            <h2 id="cal-month-label"></h2>
            <button id="cal-next" class="icon-btn">&rarr;</button>
          </div>
          <div id="calendar-grid"></div>
          <div id="calendar-legend" class="cal-legend">
            <div class="cal-legend-item"><span class="cal-legend-swatch" style="background:#1D4E5C"></span>Upcoming</div>
            <div class="cal-legend-item"><span class="cal-legend-swatch" style="background:#1DD1A1"></span>Current</div>
            <div class="cal-legend-item"><span class="cal-legend-swatch" style="background:#F49867"></span>Owner</div>
            <div class="cal-legend-item"><span class="cal-legend-swatch" style="background:#E8C948"></span>Service</div>
            <div class="cal-legend-item"><span class="cal-legend-swatch" style="background:#EE5A7B"></span>Quick turnover</div>
            <div class="cal-legend-item"><span class="cal-legend-swatch" style="background:#AEAEB2"></span>Past</div>
          </div>
          <div id="calendar-day-detail" hidden>
            <h3 id="cal-day-label"></h3>
            <div id="cal-day-events"></div>
          </div>
          <div id="turnover-banner" hidden>
            <div id="turnover-info"></div>
          </div>
        </div>
      </div>

      <!-- Inventory View -->
      <div id="view-inventory" class="view">
        <button id="add-inventory-btn" class="inv-add-btn" aria-label="Add item">
          <i data-lucide="soap-dispenser-droplet" class="icon-20"></i>
          <span>ADD ITEM</span>
        </button>
        <div id="inventory-list" class="card-list"></div>
      </div>

      <!-- Admin View -->
      <div id="view-admin" class="view">
        <div id="admin-reimbursements"></div>
        <div id="admin-vendors"></div>
        <div id="admin-team"></div>
      </div>

      <!-- SMS Compose View -->
      <div id="view-sms" class="view">
        <h2 class="view-heading">Today's Schedule</h2>
        <div id="sms-preview" class="sms-preview-box"></div>
        <div id="sms-recipient">
          <label for="sms-to">Send to:</label>
          <select id="sms-to"></select>
        </div>
        <button id="sms-send-btn" class="btn btn-primary btn-block">Open in Messages</button>
      </div>

      <!-- Profile / Settings View -->
      <div id="view-profile" class="view">
        <div id="profile-content"></div>
      </div>

    </main>

    <!-- Bottom Nav -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="feed" aria-label="Feed">
        <i data-lucide="layout-grid" class="icon-22"></i>
        <span>Tasks</span>
      </button>
      <button class="nav-btn" data-view="report" aria-label="Submit">
        <i data-lucide="send" class="icon-22"></i>
        <span>Submit</span>
      </button>
      <button class="nav-btn" data-view="calendar" aria-label="Stayzzz">
        <i data-lucide="calendar" class="icon-22"></i>
        <span>Stayzzz</span>
      </button>
      <button class="nav-btn" data-view="inventory" aria-label="Inventory">
        <i data-lucide="package" class="icon-22"></i>
        <span>Inventory</span>
      </button>
      <button class="nav-btn" data-view="admin" aria-label="Admin">
        <i data-lucide="users" class="icon-22"></i>
        <span>Admin</span>
      </button>
    </nav>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-header">
      <span id="modal-header-title" class="modal-header-title"></span>
      <button class="modal-close" onclick="hideModal()" aria-label="Close">&times;</button>
    </div>
    <div id="modal-content" class="modal-content"></div>
    <div id="modal-footer" class="modal-footer"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <!-- Scripts -->
  <script>
    window.onerror = function(msg, src, line) {
      console.error('STRpal error:', msg, src, line);
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="js/supabase-client.js?v=22"></script>
  <script src="js/notifications.js?v=22"></script>
  <script src="js/photo-picker.js?v=22"></script>
  <script src="js/options-list.js?v=22"></script>
  <script src="js/stock-status.js?v=22"></script>
  <script src="js/router.js?v=22"></script>
  <script src="js/views/feed.js?v=22"></script>
  <script src="js/views/task-detail.js?v=22"></script>
  <script src="js/views/report.js?v=22"></script>
  <script src="js/views/calendar.js?v=22"></script>
  <script src="js/views/inventory.js?v=22"></script>
  <script src="js/views/admin.js?v=22"></script>
  <script src="js/views/sms.js?v=22"></script>
  <script src="js/views/profile.js?v=22"></script>
  <script src="js/app.js?v=22"></script>

</body>
</html>
